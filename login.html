<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAC — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="page">
      <div class="stage">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="stage-content">
          <div class="logo">TA<span>C</span></div>
          <h1 class="stage-title">
            Organize o trabalho.<br />Domine os estudos.
          </h1>
          <p class="stage-subtitle">
            Um lugar só pra dar conta de tudo — hoje e todo dia.
          </p>
        </div>
      </div>

      <div class="form-side">
        <div class="glass-card">
          <div class="toggle-switch">
            <button type="button" class="toggle-btn active" data-target="login">
              Entrar
            </button>
            <button type="button" class="toggle-btn" data-target="signup">
              Criar conta
            </button>
            <div class="toggle-indicator"></div>
          </div>

          <form id="login-panel" class="form-panel" novalidate>
            <h2>Bem-vindo de volta</h2>
            <p class="form-sub">Vamos ao que interessa — seu dia te espera.</p>

            <div class="input-group">
              <input type="email" id="login-email" placeholder=" " />
              <label for="login-email">Email</label>
            </div>

            <div class="input-group">
              <input type="password" id="login-password" placeholder=" " />
              <label for="login-password">Senha</label>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>

            <div class="divider"><span>ou continue com</span></div>

            <div class="social-buttons">
              <button type="button" class="btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18">
                  <path
                    fill="#4285F4"
                    d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.62z"
                  />
                  <path
                    fill="#34A853"
                    d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.81.54-1.85.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.03z"
                  />
                  <path
                    fill="#EA4335"
                    d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58A8.6 8.6 0 0 0 9 0 9 9 0 0 0 .95 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"
                  />
                </svg>
                Google
              </button>
              <button type="button" class="btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="#1E0F11">
                  <path
                    d="M9 0a9 9 0 0 0-2.85 17.54c.45.08.62-.2.62-.44v-1.7c-2.51.55-3.04-1.07-3.04-1.07-.41-1.04-1-1.32-1-1.32-.82-.56.06-.55.06-.55.9.06 1.38.93 1.38.93.8 1.38 2.11.98 2.63.75.08-.58.32-.98.57-1.21-2-.23-4.11-1-4.11-4.46 0-.98.35-1.79.92-2.42-.09-.23-.4-1.14.09-2.38 0 0 .76-.24 2.48.92a8.6 8.6 0 0 1 4.52 0c1.72-1.16 2.48-.92 2.48-.92.49 1.24.18 2.15.09 2.38.57.63.92 1.44.92 2.42 0 3.47-2.11 4.23-4.12 4.45.33.28.61.84.61 1.7v2.5c0 .25.17.53.63.44A9 9 0 0 0 9 0z"
                  />
                </svg>
                GitHub
              </button>
            </div>
          </form>

          <form id="signup-panel" class="form-panel hidden" novalidate>
            <h2>Bora começar</h2>
            <p class="form-sub">Crie sua conta e organize tudo num só lugar.</p>

            <div class="input-group">
              <input type="text" id="signup-name" placeholder=" " />
              <label for="signup-name">Nome</label>
            </div>

            <div class="input-group">
              <input type="email" id="signup-email" placeholder=" " />
              <label for="signup-email">Email</label>
            </div>

            <div class="input-group">
              <input type="password" id="signup-password" placeholder=" " />
              <label for="signup-password">Senha</label>
            </div>

            <button type="submit" class="btn-primary">Criar conta</button>

            <div class="divider"><span>ou continue com</span></div>

            <div class="social-buttons">
              <button type="button" class="btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18">
                  <path
                    fill="#4285F4"
                    d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.62z"
                  />
                  <path
                    fill="#34A853"
                    d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.81.54-1.85.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.95v2.33A9 9 0 0 0 9 18z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.95A9 9 0 0 0 0 9c0 1.45.35 2.83.95 4.03z"
                  />
                  <path
                    fill="#EA4335"
                    d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58A8.6 8.6 0 0 0 9 0 9 9 0 0 0 .95 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"
                  />
                </svg>
                Google
              </button>
              <button type="button" class="btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="#1E0F11">
                  <path
                    d="M9 0a9 9 0 0 0-2.85 17.54c.45.08.62-.2.62-.44v-1.7c-2.51.55-3.04-1.07-3.04-1.07-.41-1.04-1-1.32-1-1.32-.82-.56.06-.55.06-.55.9.06 1.38.93 1.38.93.8 1.38 2.11.98 2.63.75.08-.58.32-.98.57-1.21-2-.23-4.11-1-4.11-4.46 0-.98.35-1.79.92-2.42-.09-.23-.4-1.14.09-2.38 0 0 .76-.24 2.48.92a8.6 8.6 0 0 1 4.52 0c1.72-1.16 2.48-.92 2.48-.92.49 1.24.18 2.15.09 2.38.57.63.92 1.44.92 2.42 0 3.47-2.11 4.23-4.12 4.45.33.28.61.84.61 1.7v2.5c0 .25.17.53.63.44A9 9 0 0 0 9 0z"
                  />
                </svg>
                GitHub
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
