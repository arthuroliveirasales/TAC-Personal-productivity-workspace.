<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="areaDeTrabalho.css" />
    <title>areaDeTrabalho</title>
  </head>
  <body>
    <div class="pageTop">
      <button type="button" class="userWorkSpace">
        <img
          src="WorkSpace-assets/user.png"
          alt="userImg"
          width="20px"
          class="userImg"
        />
        <span class="userName">User's WorkSpace</span>
        <img
          src="WorkSpace-assets/setaExpandir.png"
          alt="setaExpandir"
          width="14px"
          class="setaExpandir"
        />
      </button>

      <div class="searchBarrAll">
        <input type="text" placeholder="Search" class="searchBarr" />
        <img
          src="WorkSpace-assets/lupa.png"
          alt="lupa"
          width="14px"
          class="lupa"
        />
      </div>
    </div>

    <div class="spaceWorkTop">
      <button type="button" class="spaceWorkTitle">
        <span>Team Space</span>
        <img
          src="WorkSpace-assets/setaExpandir.png"
          alt="setaExpandir"
          width="14px"
          class="setaExpandir"
        />
      </button>

      <div class="canal">
        <button type="button" class="overview">
          <img
            src="WorkSpace-assets/overView.png"
            class="overViewImg"
            width="14px"
          />
          <span>Overview</span>
        </button>
        <button type="button" class="topList">
          <img src="WorkSpace-assets/list.png" class="listImg" width="14px" />
          <span>List</span>
        </button>
        <button type="button" class="calendar">
          <img
            src="WorkSpace-assets/calendar.png"
            class="calendarImg"
            width="13px"
          />
          <span>Calendar</span>
        </button>
        <button type="button" class="board">
          <img src="WorkSpace-assets/board.png" class="boardImg" width="14px" />
          <span>Board</span>
        </button>
        <button type="button" class="gantt">
          <img src="WorkSpace-assets/gantt.png" class="ganttImg" width="14px" />
          <span>Gantt</span>
        </button>
        <button type="button" class="table">
          <img src="WorkSpace-assets/table.png" class="tableImg" width="14px" />
          <span>Table</span>
        </button>
      </div>
    </div>

    <div class="spaceWork">
      <div class="addCardAndFilters">
        <button type="button" class="filtersContainer">
          <img
            src="WorkSpace-assets/filter.png"
            class="filterImg"
            alt="filterImg"
            width="16px"
            height="16px"
          />
          <span>Filters</span>
        </button>
        <button type="button" class="addCard">Add card</button>
      </div>
      <div class="cardContainer"></div>
    </div>

    <script src="areaDeTrabalho.js"></script>
  </body>
</html>
