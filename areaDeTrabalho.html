<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="areaDeTrabalho.css">
    <title>areaDeTrabalho</title>
</head>
<body>
    <div class="pageTop">
        <div class="userWorkSpaceAll">
            <button type="button" class="userWorkSpace">
                User's WorkSpace 
            </button>

            <img src="assets/setaExpandir.png" alt="setaExpandir" width="14px" class="setaExpandir">
        </div>  

        <div class="searchBarrAll">   
            <input type="text" placeholder="Search" class="searchBarr">
            <img src="assets/lupa.png" alt="lupa" width="14px" class="lupa">
        </div> 

    </div>

    <div class="spaceWorkTop">
       <button type="button" class="spaceWorkTitle">Team Space</button>
        <div class="canal">   
            <button type="button" class="overview">Overview</button>
            <button type="button" class="topList">List</button>
            <button type="button" class="calendar">Calendar</button>
            <button type="button" class="painting">Painting</button>
            <button type="button" class="gantt">Gantt</button>
            <button type="button" class="table">Table</button>
        </div>
    </div>

    <div class="spaceWork">
      <div class="addCardAndFilters">  
        <button type="button" class="filters">
            Filters
        </button>

        <button type="button" class="addCard">
            Add card
        </button>
      </div>
     <div class="cardContainer">
      <div class="card">
        <div class="cardTop">
            <input type="text" placeholder="Title" class="cardTitle">
          <div class="optionsContainer"> 
            <button type="button" class="options">...</button>
            
              <div class="menuOptions">
                <button class="addTask">Add List</button>
                <button class="uploadFile">Upload file</button>
                <button class="edit">Edit</button>
                <button class="duplicate">Duplicate</button>
                <button class="deleteCard">Delete Card</button>
              </div>
          </div>
        </div>  

        <div class="cardContent">
            <textarea placeholder="Type something" class="inputContent"></textarea>

            <div class="list">
                <div class="listTitleContainer">
                    <input type="text" class="listTitle" placeholder="Title">
                </div>
                    <div class="listContentContainer">
                        <div class="listContent">
                            <input type="text" class="content">
                            <button type="button" class="complete"></button>
                        </div>
                    </div>
                    <div class="addAndRemoveListContentConteiner">
                        <button type="button" class="addListContent">+ Add</button>
                        <button type="button" class="removeListContent">- Remove</button>
                    </div>
                   
            </div>

        </div>

      </div>
     </div>  

    </div>

     <script src="areaDeTrabalho.js"></script>
</body>
</html>
