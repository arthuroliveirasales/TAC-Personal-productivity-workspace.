<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/workspace.css" />
    <title>workspace</title>
  </head>
  <body>
    <div class="pageTop">
      <button type="button" class="userWorkSpace">
        <img
          src="assets/icons/workspace/user.png"
          alt="userImg"
          width="20px"
          class="userImg"
        />
        <span class="userName">User's WorkSpace</span>
        <img
          src="assets/icons/workspace/setaExpandir.png"
          alt="setaExpandir"
          width="14px"
          class="setaExpandir"
        />
      </button>

      <div class="searchBarrAll">
        <input type="text" placeholder="Search" class="searchBarr" />
        <img
          src="assets/icons/workspace/lupa.png"
          alt="lupa"
          width="14px"
          class="lupa"
        />
      </div>
    </div>

    <div class="spaceWorkTop">
      <button type="button" class="spaceWorkTitle">
        <span>Team Space</span>
        <img
          src="assets/icons/workspace/setaExpandir.png"
          alt="setaExpandir"
          width="14px"
          class="setaExpandir"
        />
      </button>

      <div class="canal">
        <button type="button" class="overview">
          <img
            src="assets/icons/workspace/overView.png"
            class="overViewImg"
            width="14px"
          />
          <span>Overview</span>
        </button>
        <button type="button" class="topList">
          <img
            src="assets/icons/workspace/list.png"
            class="listImg"
            width="14px"
          />
          <span>List</span>
        </button>
        <button type="button" class="calendar">
          <img
            src="assets/icons/workspace/calendar.png"
            class="calendarImg"
            width="13px"
          />
          <span>Calendar</span>
        </button>
        <button type="button" class="board">
          <img
            src="assets/icons/workspace/board.png"
            class="boardImg"
            width="14px"
          />
          <span>Board</span>
        </button>
        <button type="button" class="gantt">
          <img
            src="assets/icons/workspace/gantt.png"
            class="ganttImg"
            width="14px"
          />
          <span>Gantt</span>
        </button>
        <button type="button" class="table">
          <img
            src="assets/icons/workspace/table.png"
            class="tableImg"
            width="14px"
          />
          <span>Table</span>
        </button>
      </div>
    </div>

    <div class="spaceWork">
      <div class="addCardAndFilters">
        <button type="button" class="filtersContainer">
          <img
            src="assets/icons/workspace/filter.png"
            class="filterImg"
            alt="filterImg"
            width="16px"
            height="16px"
          />
          <span>Filters</span>
        </button>
        <button type="button" class="addCard">Add card</button>
      </div>
      <div class="cardContainer"></div>
    </div>

    <script type="module" src="js/DOM/index.js"></script>
  </body>
</html>
